<div class = "container">

  <div class="mb-2">
    <div>
      <button class="btn btn-dark mb-2 me-2" (click)="isCollapse = !isCollapse">Filtre</button>
      <button class="btn btn-secondary mb-2" (click)="ResetFilters()" [hidden]="!filtering">Reset</button>
    </div>

    <div [collapse]="isCollapse" [isAnimated]="true">
      <div class="bg-dark text-white mb-2 shadow-sm" style= "width: 250px;">
        <form>
          <div class="row mx-0">

            <div class="col">
              <small><b>Langages:</b></small>
              <div class="form-group">
                <div class="form-check">
                  <input type="checkbox"
                         class="form-check-input position-static me-2"
                         [(ngModel)]="java"
                         (change)="Filter()"
                         name="Java">

                  <label class="form-check-label small">Java</label>
                </div>
                <div class="form-check">
                  <input type="checkbox"
                         class="form-check-input position-static me-2"
                         [(ngModel)]="csharp"
                         (change)="Filter()"
                          name="Csharp">

                  <label class="form-check-label small">C#</label>
                </div>
                <div class="form-check">
                  <input type="checkbox"
                         class="form-check-input position-static me-2"
                         [(ngModel)]="cplus"
                         (change)="Filter()"
                         name="Cplus">

                  <label class="form-check-label small">C++</label>
                </div>
                <div class="form-check">
                  <input type="checkbox"
                         class="form-check-input position-static me-2"
                         [(ngModel)]="typescript"
                         (change)="Filter()"
                         name="Csharp">

                  <label class="form-check-label small">TypeScript</label>
                </div>
              </div>
            </div>

            <div class="col">
              <small><b>Frameworks:</b></small>
              <div class="form-group">
                <div class="form-check">
                  <input type="checkbox"
                         class="form-check-input position-static me-2"
                         [(ngModel)]="angular"
                         (change)="Filter()"
                         name="Angular">

                  <label class="form-check-label small">Angular</label>
                </div>
                <div class="form-check">
                  <input type="checkbox"
                         class="form-check-input position-static me-2"
                         [(ngModel)]="unity"
                         (change)="Filter()"
                         name="Unity">

                  <label class="form-check-label small">Unity</label>
                </div>
                <div class="form-check">
                  <input type="checkbox"
                         class="form-check-input position-static me-2"
                         [(ngModel)]="javafx"
                         (change)="Filter()"
                         name="Javafx">

                  <label class="form-check-label small">JavaFx</label>
                </div>
              </div>
            </div>
          </div>

        </form>
      </div>
    </div>
  </div>

  <div class="row justify-content-center">
    <div *ngFor="let project of projects" class="col-lg-4 col-md-4 mb-4" style="max-width: 380px; min-width: 380px">
      <app-project-card [project]="project"></app-project-card>
    </div>
  </div>

</div>
